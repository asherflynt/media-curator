<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>media-curator</title>
<style>
  :root {
    --bg:#12141a; --panel:#1a1d26; --line:#2c3040; --fg:#e6e8ef;
    --dim:#8b91a6; --accent:#5aa9e6; --warn:#e6a15a; --bad:#e65a5a; --good:#5ae68c;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { background:var(--panel); border-bottom:1px solid var(--line);
           padding:0 20px; display:flex; align-items:center; gap:22px; }
  header h1 { font-size:15px; margin:0; padding:14px 0; letter-spacing:.4px; }
  nav a { color:var(--dim); text-decoration:none; padding:14px 0; display:inline-block;
          border-bottom:2px solid transparent; margin-right:18px; }
  nav a:hover { color:var(--fg); }
  nav a.on { color:var(--fg); border-bottom-color:var(--accent); }
  main { padding:22px; max-width:1200px; margin:0 auto; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px;
           padding:16px 18px; margin-bottom:18px; }
  .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.8px;
              color:var(--dim); margin:0 0 12px; font-weight:600; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:7px 10px; border-bottom:1px solid var(--line); }
  th { color:var(--dim); font-weight:600; font-size:12px; text-transform:uppercase;
       letter-spacing:.5px; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .scroll { overflow-x:auto; }
  .big { font-size:30px; font-weight:600; font-variant-numeric:tabular-nums; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px; }
  .dim { color:var(--dim); }
  .warn { color:var(--warn); } .bad { color:var(--bad); } .good { color:var(--good); }
  .note { border-left:3px solid var(--warn); padding:10px 14px; background:#221e17;
          border-radius:0 6px 6px 0; margin-bottom:14px; }
  .note.bad { border-left-color:var(--bad); background:#241819; }
  .note.ok { border-left-color:var(--good); background:#16231b; }
  .bar { height:8px; background:var(--line); border-radius:4px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--accent); }
  button, input[type=submit] { background:var(--accent); color:#08111a; border:0;
    padding:8px 14px; border-radius:6px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--dim); border:1px solid var(--line); }
  input[type=text], input[type=number] { background:#0e1016; border:1px solid var(--line);
    color:var(--fg); padding:7px 9px; border-radius:6px; width:100%; }
  label { display:block; margin-bottom:14px; }
  label > span { display:block; color:var(--dim); font-size:12px; margin-bottom:4px; }
  .pill { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px;
          background:var(--line); color:var(--dim); }
  .pill.dry { background:#3a2f16; color:var(--warn); }
  .pill.live { background:#3a1a1a; color:var(--bad); }
  code { background:#0e1016; padding:1px 5px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>media-curator</h1>
  <nav>
    <a href="/" class="{{ 'on' if page=='dashboard' }}">Dashboard</a>
    <a href="/candidates" class="{{ 'on' if page=='candidates' }}">Candidates</a>
    <a href="/blocklist" class="{{ 'on' if page=='blocklist' }}">Blocklist</a>
    <a href="/rules" class="{{ 'on' if page=='rules' }}">Rules</a>
    <a href="/audit" class="{{ 'on' if page=='audit' }}">Audit</a>
    <a href="/history" class="{{ 'on' if page=='history' }}">History</a>
    <a href="/connections" class="{{ 'on' if page=='connections' }}">Connections</a>
    <a href="/settings" class="{{ 'on' if page=='settings' }}">Settings</a>
  </nav>
  <span style="margin-left:auto">
    {% if settings and settings.dry_run %}<span class="pill dry">DRY RUN</span>
    {% elif settings %}<span class="pill live">LIVE</span>{% endif %}
  </span>
</header>
<main>{% block body %}{% endblock %}</main>
</body>
</html>
