<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>media-curator</title>
<style>
  :root {
    --bg:#12141a; --panel:#1a1d26; --line:#2c3040; --fg:#e6e8ef;
    --dim:#8b91a6; --accent:#5aa9e6; --warn:#e6a15a; --bad:#e65a5a; --good:#5ae68c;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { background:var(--panel); border-bottom:1px solid var(--line);
           padding:0 20px; display:flex; align-items:center; gap:22px; }
  header h1 { font-size:15px; margin:0; padding:14px 0; letter-spacing:.4px; }
  nav a { color:var(--dim); text-decoration:none; padding:14px 0; display:inline-block;
          border-bottom:2px solid transparent; margin-right:18px; }
  nav a:hover { color:var(--fg); }
  nav a.on { color:var(--fg); border-bottom-color:var(--accent); }
  main { padding:22px; max-width:1200px; margin:0 auto; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px;
           padding:16px 18px; margin-bottom:18px; }
  .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.8px;
              color:var(--dim); margin:0 0 12px; font-weight:600; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:7px 10px; border-bottom:1px solid var(--line); }
  th { color:var(--dim); font-weight:600; font-size:12px; text-transform:uppercase;
       letter-spacing:.5px; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .scroll { overflow-x:auto; }
  .big { font-size:30px; font-weight:600; font-variant-numeric:tabular-nums; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px; }
  .dim { color:var(--dim); }
  .warn { color:var(--warn); } .bad { color:var(--bad); } .good { color:var(--good); }
  .note { border-left:3px solid var(--warn); padding:10px 14px; background:#221e17;
          border-radius:0 6px 6px 0; margin-bottom:14px; }
  .note.bad { border-left-color:var(--bad); background:#241819; }
  .note.ok { border-left-color:var(--good); background:#16231b; }
  .bar { height:8px; background:var(--line); border-radius:4px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--accent); }
  button, input[type=submit] { background:var(--accent); color:#08111a; border:0;
    padding:8px 14px; border-radius:6px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--dim); border:1px solid var(--line); }
  input[type=text], input[type=number] { background:#0e1016; border:1px solid var(--line);
    color:var(--fg); padding:7px 9px; border-radius:6px; width:100%; }
  label { display:block; margin-bottom:14px; }
  label > span { display:block; color:var(--dim); font-size:12px; margin-bottom:4px; }
  .pill { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px;
          background:var(--line); color:var(--dim); }
  .pill.dry { background:#3a2f16; color:var(--warn); }
  .pill.live { background:#3a1a1a; color:var(--bad); }
  code { background:#0e1016; padding:1px 5px; border-radius:4px; font-size:12px; }
  .run-result { margin-top:12px; }
  button[disabled] { opacity:.6; cursor:progress; }
  @keyframes rr-pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .run-result.running .panel h2 { animation:rr-pulse 1s ease-in-out infinite; }
</style>
</head>
<body>
<header>
  <h1>media-curator</h1>
  <nav>
    <a href="/" class="{{ 'on' if page=='dashboard' }}">Dashboard</a>
    <a href="/candidates" class="{{ 'on' if page=='candidates' }}">Candidates</a>
    <a href="/blocklist" class="{{ 'on' if page=='blocklist' }}">Blocklist</a>
    <a href="/rules" class="{{ 'on' if page=='rules' }}">Rules</a>
    <a href="/audit" class="{{ 'on' if page=='audit' }}">Audit</a>
    <a href="/history" class="{{ 'on' if page=='history' }}">History</a>
    <a href="/connections" class="{{ 'on' if page=='connections' }}">Connections</a>
    <a href="/settings" class="{{ 'on' if page=='settings' }}">Settings</a>
  </nav>
  <span style="margin-left:auto">
    {% if settings and settings.dry_run %}<span class="pill dry">DRY RUN</span>
    {% elif settings %}<span class="pill live">LIVE</span>{% endif %}
  </span>
</header>
<main>{% block body %}{% endblock %}</main>
<script>
(function () {
  function esc(s) {
    return String(s).replace(/[&<>]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c];
    });
  }
  function num(v) {
    return (typeof v === 'number') ? (Math.round(v * 10) / 10).toLocaleString() : esc(v);
  }
  function stat(label, value) {
    return '<div><div class="dim">' + esc(label) + '</div>' +
           '<div class="big">' + value + '</div></div>';
  }

  // Turn a run-endpoint JSON response into a friendly result card.
  function render(box, data, httpOk) {
    var isError = !httpOk || data.error || data.aborted;
    var acted = data.acted;
    var cls = isError ? 'bad' : (acted === false ? 'dim' : 'good');
    var heading = isError ? (data.aborted ? 'Loop aborted' : 'Something went wrong')
                          : (acted === false ? 'Nothing to do' : 'Done');
    var message = data.summary || data.reason || data.error || '';

    var html = '<div class="panel">';
    html += '<h2 class="' + cls + '">' + esc(heading) + '</h2>';
    if (message) html += '<p style="margin:0 0 4px">' + esc(message) + '</p>';

    // Headline numbers, whichever of these the response carries.
    var cells = [];
    var st = data.status || {};
    if (typeof st.free_gb === 'number') cells.push(stat('Free now', num(st.free_gb) + ' GB'));
    if (typeof st.deficit_gb === 'number') cells.push(stat('Deficit', num(st.deficit_gb) + ' GB'));
    if (Array.isArray(data.chosen)) cells.push(stat('Demotions', data.chosen.length));
    if (typeof data.eligible === 'number') cells.push(stat('Eligible', data.eligible));
    if (typeof data.assigned === 'object' && data.assigned)
      cells.push(stat('Assigned', num(data.assigned.assigned)));
    if (typeof data.grabbed === 'number') cells.push(stat('Grabbed', data.grabbed));
    if (typeof data.remaining === 'number') cells.push(stat('Pending', data.remaining));
    if (typeof data.stuck === 'number') cells.push(stat('Stuck', data.stuck));
    if (typeof data.imported === 'number') cells.push(stat('Imported', data.imported));
    if (cells.length) html += '<div class="grid" style="margin-top:12px">' + cells.join('') + '</div>';

    // What was acted on.
    if (Array.isArray(data.chosen) && data.chosen.length) {
      html += '<div class="scroll" style="margin-top:14px"><table>' +
        '<tr><th>Title</th><th class="num">Reclaim</th><th class="num">Score</th></tr>';
      data.chosen.forEach(function (c) {
        html += '<tr><td>' + esc(c.title) + (c.dry_run ? ' <span class="pill dry">dry</span>' : '') +
          '</td><td class="num">' + num(c.reclaim_gb) + ' GB</td>' +
          '<td class="num">' + num(c.score) + '</td></tr>';
      });
      html += '</table></div>';
    }

    // Why candidates were skipped -- only the reasons that fired.
    if (data.rejected && typeof data.rejected === 'object') {
      var reasons = Object.keys(data.rejected).filter(function (k) { return data.rejected[k]; });
      if (reasons.length) {
        html += '<p class="dim" style="margin:12px 0 0">Skipped: ' +
          reasons.map(function (k) {
            return esc(k.replace(/_/g, ' ')) + ' ' + data.rejected[k];
          }).join(' &middot; ') + '</p>';
      }
    }

    html += '<p style="margin:14px 0 0"><a href="" style="color:var(--accent)">Reload page</a> ' +
            '<span class="dim">to refresh the figures above.</span></p>';
    html += '</div>';
    box.className = 'run-result';
    box.innerHTML = html;
  }

  document.querySelectorAll('form[data-run]').forEach(function (form) {
    form.addEventListener('submit', function (ev) {
      ev.preventDefault();
      var msg = form.getAttribute('data-confirm');
      if (msg && !window.confirm(msg)) return;

      var btn = form.querySelector('button, input[type=submit]');
      var label = btn ? btn.textContent : '';
      if (btn) { btn.disabled = true; btn.textContent = 'Running…'; }

      var box = form.nextElementSibling;
      if (!box || !box.classList.contains('run-result')) {
        box = document.createElement('div');
        form.parentNode.insertBefore(box, form.nextSibling);
      }
      box.className = 'run-result running';
      box.innerHTML = '<div class="panel"><h2>Running…</h2>' +
        '<p class="dim" style="margin:0">Working through the candidates &mdash; this can take a moment.</p></div>';

      fetch(form.action, { method: 'POST', headers: { 'Accept': 'application/json' } })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
        .then(function (res) { render(box, res.data, res.ok); })
        .catch(function (e) {
          box.className = 'run-result';
          box.innerHTML = '<div class="panel"><h2 class="bad">Request failed</h2>' +
            '<p style="margin:0">' + esc(e && e.message ? e.message : e) + '</p></div>';
        })
        .then(function () {
          if (btn) { btn.disabled = false; btn.textContent = label; }
        });
    });
  });
})();
</script>
</body>
</html>
